services:
    - type: web
    name: yt-live
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
            - key: YOUTUBE_KEY
        sync: false
            - key: OVERLAY_URL
        sync: false
            - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: false
            - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
